name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install ./ml
          grep -v '^-e ' apps/api/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install ruff pytest
      - name: Lint (ruff — syntax/undefined only)
        run: ruff check --select E9,F63,F7,F82 apps/api ml
      - name: Tests
        working-directory: apps/api
        env:
          DATABASE_URL: "sqlite:///./ci.db"
          API_ENV: development
        run: pytest -q

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build
